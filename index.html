<html>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: rgba(173, 161, 159, 0.171);
        }

        header {
            background-color: #ff7675;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header img {
            width: 120px;
            border-radius: 50%;
        }

        nav {
            background-color: #74b9ff;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        main {
            display: flex;
            padding: 20px;
        }

        section {
            flex: 2;
            background-color: #ffeaa7;
            padding: 20px;
            margin-right: 15px;
            border-radius: 10px;
        }

        article {
            background-color: white;
            padding: 15px;
            margin-top: 15px;
            border-left: 5px solid #ff7675;
            border-radius: 5px;
        }

        article img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        aside {
            flex: 1;
            background-color: #55efc4;
            padding: 20px;
            border-radius: 10px;
        }

        aside img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        footer {
            background-color: #2d3436;
            color: white;
            text-align: center;
            padding: 10px;
        }

        button {
            background-color: #d63031;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e17055;
        }

        input {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
    </style>
</head>
